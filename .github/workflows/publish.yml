name: publish

# Builds and pushes all four telephony images to GHCR via docker buildx bake.
#
# Triggers: pushes to main, pushed tags, and manual dispatch (optional custom tag).
# Each run pushes both :<git-sha> (or the dispatch tag) and :latest.
#
# IMPORTANT — package visibility: GHCR packages are created PRIVATE by default.
# After the first successful publish, an org/repo admin must flip each package's
# visibility to Public so anyone can `docker pull` without auth:
#   GitHub -> the package (under the org/repo Packages tab) -> Package settings ->
#   Danger Zone -> Change visibility -> Public.
# Alternatively set the org default package visibility to Public. This is a
# one-time admin action; the workflow itself cannot make packages public.

on:
  push:
    branches: [main]
    tags: ["*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to the git short SHA)"
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag and registry
        id: meta
        run: |
          echo "tag=${{ github.event.inputs.tag || github.sha }}" >> "$GITHUB_OUTPUT"
          # GHCR requires a lowercase repository path; the org is "REGALITECH".
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "registry=ghcr.io/${owner_lc}/docker" >> "$GITHUB_OUTPUT"

      - name: Bake & push (all images)
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7
        with:
          push: true
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
